<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Kings | Quiz</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body class="page-quiz">
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="../index.html" class="site-logo" aria-label="Movie Kings home">
        <img src="../images/logo-movie-kings.svg" alt="Movie Kings logo" class="site-logo__icon" />
        <span class="site-logo__text">Movie Kings</span>
      </a>

      <button type="button" class="quiz__stop">Stop Quiz</button>
    </div>
  </header>

  <main class="quiz">
    <div class="quiz__inner">
      <section class="quiz__progress" aria-label="Quiz progress">
        <div class="quiz__progress-head">
          <span>Question 1 of 10</span>
          <span>10%</span>
        </div>

        <div class="quiz__progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="10" aria-label="Quiz completion">
          <span class="quiz__progress-fill"></span>
        </div>
      </section>

      <section class="quiz__card" aria-labelledby="quiz-question">
        <h1 class="quiz__question" id="quiz-question">"Here's looking at you, kid."</h1>

        <ul class="quiz__answers" aria-label="Answer choices">
          <li>
            <button type="button" class="quiz__answer" data-correct="true">
              <span class="quiz__answer-title">Casablanca</span>
              <span class="quiz__answer-meta">Michael Curtiz</span>
              <span class="quiz__answer-year">1942</span>
            </button>
          </li>
          <li>
            <button type="button" class="quiz__answer">
              <span class="quiz__answer-title">Gone with the Wind</span>
              <span class="quiz__answer-meta">Victor Fleming</span>
              <span class="quiz__answer-year">1939</span>
            </button>
          </li>
          <li>
            <button type="button" class="quiz__answer">
              <span class="quiz__answer-title">The Maltese Falcon</span>
              <span class="quiz__answer-meta">John Huston</span>
              <span class="quiz__answer-year">1941</span>
            </button>
          </li>
          <li>
            <button type="button" class="quiz__answer">
              <span class="quiz__answer-title">Citizen Kane</span>
              <span class="quiz__answer-meta">Orson Welles</span>
              <span class="quiz__answer-year">1941</span>
            </button>
          </li>
        </ul>

        <div class="quiz__actions">
          <button type="button" class="quiz__submit quiz__submit--disabled" disabled>Submit Answer</button>
        </div>
      </section>
    </div>
  </main>

  <footer class="quiz-footer"></footer>

  <script src="../scripts/quiz.js"></script>
</body>
</html>
